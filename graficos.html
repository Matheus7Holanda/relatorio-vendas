<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RELATÓRIOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>
    
    <div class="section container-fluid">
        <h2 class="text-center mb-4">Gráficos</h2>
        
        <div class="mb-4">
            <canvas id="linhas" class="mx-auto"></canvas>
        </div>
        
        <div class="mb-4">
            <canvas id="barras" class="mx-auto"></canvas>
        </div>
        
        <div class="mb-3">
            <canvas id="pizza" class="mx-auto"></canvas>
        </div>
    </div>


<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

<script>
    $('#tabelaVendas').DataTable();


    // Gráfico de linhas: Vendas por Mês
    let graficoLinhas = new Chart(document.getElementById('linhas'), {
        type: 'line',
        data: {
            labels: [
                // PLACEHOLDER: Array de meses ['Jan', 'Fev', 'Mar', ...] do MySQL
                'Jan', 'Fev', 'Mar'
            ],
            datasets: [{
                label: 'Vendas por Mês',
                data: [
                    // PLACEHOLDER: Array de valores de vendas por mês [1500, 2300, 1800, ...] do MySQL
                    1500, 2300, 1800
                ],
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.1,
                fill: false
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Vendas por Mês'
                }
            }
        }
    });


    // Gráfico de barras: Total de vendas por vendedor
    let graficoBarras = new Chart(document.getElementById('barras'), {
        type: 'bar',
        data: {
            labels: [
                // PLACEHOLDER: Array de nomes de vendedores ['João', 'Maria', 'Pedro', ...] do MySQL
                'João', 'Maria', 'Pedro'
            ],
            datasets: [{
                label: 'Total de Vendas',
                data: [
                    // PLACEHOLDER: Array de totais de vendas por vendedor [5000, 7500, 6200, ...] do MySQL
                    5000, 7500, 6200
                ],
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Total de Vendas por Vendedor'
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });


    // Gráfico de pizza: Total de vendas por vendedor
    let graficoPizza = new Chart(document.getElementById('pizza'), {
        type: 'pie',
        data: {
            labels: [
                // PLACEHOLDER: Array de nomes de vendedores ['João', 'Maria', 'Pedro', ...] do MySQL
                'João', 'Maria', 'Pedro'
            ],
            datasets: [{
                label: 'Vendas por Vendedor',
                data: [
                    // PLACEHOLDER: Array de totais de vendas por vendedor [5000, 7500, 6200, ...] do MySQL
                    5000, 7500, 6200
                ],
                backgroundColor: [
                    'rgba(255, 99, 132, 0.6)',
                    'rgba(54, 162, 235, 0.6)',
                    'rgba(255, 206, 86, 0.6)',
                    'rgba(75, 192, 192, 0.6)',
                    'rgba(153, 102, 255, 0.6)',
                    'rgba(255, 159, 64, 0.6)'
                ],
                borderColor: [
                    'rgba(255, 99, 132, 1)',
                    'rgba(54, 162, 235, 1)',
                    'rgba(255, 206, 86, 1)',
                    'rgba(75, 192, 192, 1)',
                    'rgba(153, 102, 255, 1)',
                    'rgba(255, 159, 64, 1)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Total de Vendas por Vendedor'
                }
            }
        }
    });


    function atualizar() {
        let vendedores = [];       // PLACEHOLDER: Preencher com nomes de vendedores do MySQL
        let vendasPorVendedor = []; // PLACEHOLDER: Preencher com totais de vendas por vendedor do MySQL
        let meses = [];            // PLACEHOLDER: Preencher com meses do MySQL
        let vendasPorMes = [];     // PLACEHOLDER: Preencher com vendas por mês do MySQL
        let totalVendas = 0;
        let totalRegistro = 0;


        // Itera sobre as linhas da tabela de vendas
        document.querySelectorAll("#tabelaVendas tbody tr").forEach(tr => {
            let inputs = tr.querySelectorAll("input");


            // PLACEHOLDER: inputs[0] = ID da venda, inputs[1] = Nome vendedor, 
            // inputs[2] = Mês, inputs[3] = Valor da venda, inputs[4] = Data


            let vendedor = inputs[1].value || "Vendedor";
            let mes = inputs[2].value || "Mês";
            let valorVenda = parseFloat(inputs[3].value) || 0;


            totalVendas += valorVenda;
            totalRegistro++;


            // Acumula vendas por vendedor
            let indiceVendedor = vendedores.indexOf(vendedor);
            if (indiceVendedor === -1) {
                vendedores.push(vendedor);
                vendasPorVendedor.push(valorVenda);
            } else {
                vendasPorVendedor[indiceVendedor] += valorVenda;
            }


            // Acumula vendas por mês
            let indiceMes = meses.indexOf(mes);
            if (indiceMes === -1) {
                meses.push(mes);
                vendasPorMes.push(valorVenda);
            } else {
                vendasPorMes[indiceMes] += valorVenda;
            }
        });


        // Atualiza Gráfico de Linhas (Vendas por Mês)
        graficoLinhas.data.labels = meses;
        graficoLinhas.data.datasets[0].data = vendasPorMes;
        graficoLinhas.update();


        // Atualiza Gráfico de Barras (Total por Vendedor)
        graficoBarras.data.labels = vendedores;
        graficoBarras.data.datasets[0].data = vendasPorVendedor;
        graficoBarras.update();


        // Atualiza Gráfico de Pizza (Total por Vendedor)
        graficoPizza.data.labels = vendedores;
        graficoPizza.data.datasets[0].data = vendasPorVendedor;
        graficoPizza.update();


        // Atualizar elemento HTML com total geral
        // document.getElementById('totalVendas').textContent = totalVendas.toFixed(2);
    }


    document.addEventListener("input", atualizar);


    // PLACEHOLDER: Função para carregar dados do PHP/MySQL
    /*

        fetch('php/carregar_vendas.php')  // PLACEHOLDER: Caminho para seu arquivo PHP
            .then(response => response.json())
            .then(dados => {
                // PLACEHOLDER: Estrutura esperada do JSON do PHP:
                // {
                //   meses: ['Jan', 'Fev', 'Mar', ...],
                //   vendasMes: [1500, 2300, 1800, ...],
                //   vendedores: ['João', 'Maria', 'Pedro', ...],
                //   vendasVendedor: [5000, 7500, 6200, ...]
                // }
                
                graficoLinhas.data.labels = dados.meses;
                graficoLinhas.data.datasets[0].data = dados.vendasMes;
                graficoLinhas.update();
                
                graficoBarras.data.labels = dados.vendedores;
                graficoBarras.data.datasets[0].data = dados.vendasVendedor;

    }
    
    // Chamar ao carregar a página
    // carregarDadosVendas();
    */
</script>

</body>
</html>
