<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa Interativo</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .map-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .map-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0,0,0,0.35);
    }

    .map-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 1.5rem;
    }

    .map-header h1 {
      font-size: 2rem;
      font-weight: bold;
      margin: 0;
    }

    .map-header p {
      margin: 0;
      opacity: 0.9;
    }

    #map {
      width: 100%;
      height: 550px;
    }

    .info-box {
      border-radius: 12px;
      background: #f8fafc;
      padding: 1rem;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
    }

    .badge-custom {
      background: #667eea;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
    }
  </style>
</head>
<body>

  <div class="container py-5">

    <div class="row justify-content-center">
      <div class="col-lg-10">

        <div class="map-card">

          <div class="map-header d-flex justify-content-between align-items-center flex-wrap">
            <div>
              <h1>🗺️ Mapa Interativo</h1>
              <p>Exemplo usando Bootstrap + Leaflet + OpenStreetMap</p>
            </div>

            <span class="badge badge-custom">
              API Gratuita
            </span>
          </div>

          <div id="map"></div>

          <div class="p-4">

            <div class="row g-3">

              <div class="col-md-4">
                <div class="info-box">
                  <h5>📍 Localização</h5>
                  <p class="mb-0">São Paulo - SP</p>
                </div>
              </div>

              <div class="col-md-4">
                <div class="info-box">
                  <h5>🌎 Latitude</h5>
                  <p class="mb-0">-23.55052</p>
                </div>
              </div>

              <div class="col-md-4">
                <div class="info-box">
                  <h5>🛰️ Longitude</h5>
                  <p class="mb-0">-46.633308</p>
                </div>
              </div>

            </div>

          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Coordenadas de São Paulo
    const latitude = -23.55052;
    const longitude = -46.633308;

    // Inicializa o mapa
    const map = L.map('map').setView([latitude, longitude], 12);

    // Camada OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Marcador
    L.marker([latitude, longitude])
      .addTo(map)
      .bindPopup('<b>São Paulo</b><br>Centro da cidade')
      .openPopup();
  </script>

</body>
</html>
